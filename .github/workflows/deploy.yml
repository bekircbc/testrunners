name: Build and Deploy NextJS to Hetzner

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}:latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to the Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH to Hetzner
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 167.235.61.203
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }} # We will set this secret in GitHub next
          script: |
            cd /var/www/my-awesome-app
            docker compose pull testrunners-app
            docker compose up -d testrunners-app
