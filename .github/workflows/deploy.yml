name: Build and Deploy NextJS to Hetzner

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}:latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to the Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
       - name: Deploy via SSH to Hetzner
         uses: appleboy/ssh-action@v1.0.3
         with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /var/www/my-awesome-app
            # Remove any standalone container instance if present to avoid name collisions
            docker rm -f testrunners_nextjs || true
            # Pull latest image and recreate container seamlessly
            docker compose pull testrunners-app
            docker compose up -d --force-recreate testrunners-app
            # Prune old dangling images to save disk space
            docker image prune -f
